name: Inkwell
options:
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: 1.5.0
  vapor:
    url: https://github.com/vapor/vapor.git
    from: 4.110.0
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.1.3
  swift-cmark:
    url: https://github.com/swiftlang/swift-cmark.git
    branch: main
targets:
  BlogCLI:
    type: tool
    platform: macOS
    sources:
      - Sources/BlogCLI
    dependencies:
      - target: BlogCore
      - target: BlogPreview
      - package: swift-argument-parser
        product: ArgumentParser

  BlogCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/BlogCore
    dependencies:
      - target: BlogRenderer
      - target: BlogThemes
      - target: BlogPlugins
      - package: Yams
        product: Yams

  BlogRenderer:
    type: library.static
    platform: macOS
    sources:
      - Sources/BlogRenderer
    dependencies:
      - package: swift-cmark
        product: cmark

  BlogThemes:
    type: library.static
    platform: macOS
    sources:
      - Sources/BlogThemes

  BlogPlugins:
    type: library.static
    platform: macOS
    sources:
      - Sources/BlogPlugins

  BlogPreview:
    type: library.static
    platform: macOS
    sources:
      - Sources/BlogPreview
    dependencies:
      - package: vapor
        product: Vapor

  BlogPreviewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogPreviewTests
    dependencies:
      - target: BlogPreview

  BlogCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogCoreTests
    dependencies:
      - target: BlogCore

  BlogRendererTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogRendererTests
    dependencies:
      - target: BlogRenderer

  BlogThemesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogThemesTests
    dependencies:
      - target: BlogThemes

  BlogPluginsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogPluginsTests
    dependencies:
      - target: BlogPlugins

  BlogCLITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/BlogCLITests
    dependencies:
      - target: BlogCLI
      - target: BlogCore

  IntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/IntegrationTests
    dependencies:
      - target: BlogCLI
      - target: BlogCore
      - target: BlogRenderer

schemes:
  Inkwell:
    build:
      targets:
        BlogCLI: all
    test:
      targets:
        - name: BlogPreviewTests
        - name: BlogCoreTests
        - name: BlogRendererTests
        - name: BlogThemesTests
        - name: BlogPluginsTests
        - name: BlogCLITests
        - name: IntegrationTests

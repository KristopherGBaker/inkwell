name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build universal binary and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/inkwell \
            .build/x86_64-apple-macosx/release/inkwell \
            -output inkwell
          chmod +x inkwell

      - name: Stage resource bundle alongside binary
        run: |
          # SwiftPM produces an identical resource bundle for both architectures.
          cp -R .build/arm64-apple-macosx/release/swift-blog_BlogThemes.bundle .

      - name: Package binary + bundle into tarball
        run: tar -czf inkwell-macos.tar.gz inkwell swift-blog_BlogThemes.bundle

      - name: Compute checksums
        run: |
          shasum -a 256 inkwell | tee inkwell.sha256
          shasum -a 256 inkwell-macos.tar.gz | tee inkwell-macos.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            inkwell-macos.tar.gz
            inkwell-macos.tar.gz.sha256
            inkwell
            inkwell.sha256
          generate_release_notes: true

      - name: Bump Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA256=$(shasum -a 256 inkwell-macos.tar.gz | awk '{print $1}')

          gh repo clone KristopherGBaker/homebrew-tap tap-repo
          cd tap-repo

          cat > Formula/inkwell.rb <<EOF
          class Inkwell < Formula
            desc "Swift static publishing CLI"
            homepage "https://github.com/KristopherGBaker/inkwell"
            version "${VERSION}"

            on_macos do
              url "https://github.com/KristopherGBaker/inkwell/releases/download/v#{version}/inkwell-macos.tar.gz"
              sha256 "${SHA256}"
            end

            def install
              bin.install "inkwell"
              bin.install "swift-blog_BlogThemes.bundle"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/inkwell --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/KristopherGBaker/homebrew-tap.git"
          git commit -am "chore: bump inkwell to ${VERSION}"
          git push

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Verify project
        run: make verify SWIFTLINT=swiftlint

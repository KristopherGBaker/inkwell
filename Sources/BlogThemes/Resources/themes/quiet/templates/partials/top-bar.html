<header class="top-bar">
  <div class="container top-bar-row">
    <a href="{{ links.home }}" class="top-brand">
      <span class="top-brand-mark">{{ site.brandInitial }}</span>
      <span class="top-brand-text">
        <span class="top-brand-name">{{ site.title }}</span>
        {% if site.brandSubtitle %}<span class="top-brand-sub">{{ site.brandSubtitle }}</span>{% endif %}
      </span>
    </a>
    <nav class="top-nav">
      {% for item in site.nav %}<a href="{{ item.route }}" class="nav-link">{{ item.label }}</a>{% endfor %}
      <button type="button" onclick="toggleTheme()" class="chip no-print" aria-label="{{ site.themeCopy.themeToggleLabel }}">☼</button>
    </nav>
  </div>
</header>

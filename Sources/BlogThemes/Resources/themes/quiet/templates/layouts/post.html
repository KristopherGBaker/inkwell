{% extends "base.html" %}
{% block main %}    <main class="container page-shell">
      <article class="reading post-detail">
        <header>
          <p class="eyebrow">{{ page.date }}</p>
          <h1 class="h1">{{ page.title }}</h1>
          {% if page.chips %}<div class="chip-row">{% for chip in page.chips %}<a href="{{ chip.href }}" class="tag-chip">{{ chip.label }}</a>{% endfor %}</div>{% endif %}
        </header>
        {% if page.coverImage %}<figure class="shot-frame post-cover"><img src="{{ page.coverImage.src }}" alt="Cover image for {{ page.coverImage.alt }}"></figure>{% endif %}
        <div class="prose">{{ page.content }}</div>
      </article>
    </main>
{% endblock %}

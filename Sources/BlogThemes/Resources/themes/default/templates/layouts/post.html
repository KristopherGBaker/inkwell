{% extends "base.html" %}
{% block main %}    <main class="mx-auto max-w-3xl px-6 pb-20 pt-10 md:px-10 md:pt-14">
      <div class="flex items-center justify-between gap-4">
        <a href="{{ links.home }}" class="inline-flex items-center gap-2 text-sm font-medium text-amber-800 hover:text-amber-900 dark:text-amber-300 dark:hover:text-amber-200">← Back to entries</a>
        <button type="button" onclick="toggleTheme()" class="rounded-full border border-stone-400/70 px-3 py-1 text-xs font-medium uppercase tracking-[0.14em] text-stone-700 transition hover:border-amber-700/60 hover:text-amber-800 dark:border-stone-600 dark:text-stone-200 dark:hover:border-amber-300 dark:hover:text-amber-200">Toggle Theme</button>
      </div>
      <header class="mt-6 border-b border-stone-300/70 pb-6 dark:border-stone-700/70">
        <p class="text-xs uppercase tracking-[0.22em] text-stone-500 dark:text-stone-400">{{ page.date }}{% if page.readingTimeLabel %} · {{ page.readingTimeLabel }}{% endif %}</p>
        <h1 class="mt-3 font-display text-4xl leading-tight text-stone-900 dark:text-stone-100 md:text-5xl">{{ page.title }}</h1>
        <div class="mt-4 flex flex-wrap gap-2">{% for chip in page.chips %}<a href="{{ chip.href }}" class="rounded-full border border-stone-400/50 px-2.5 py-1 text-[11px] uppercase tracking-[0.12em] text-stone-600 transition hover:border-amber-700/50 hover:text-amber-800 dark:border-stone-600 dark:text-stone-300 dark:hover:border-amber-300 dark:hover:text-amber-200">{{ chip.label }}</a>{% endfor %}</div>
      </header>
{% if page.coverImage %}      <figure class="mt-8 overflow-hidden rounded-2xl border border-stone-300/70 shadow-[0_14px_48px_-28px_rgba(28,25,23,0.6)] dark:border-stone-700"><img src="{{ page.coverImage.src }}" alt="Cover image for {{ page.coverImage.alt }}" class="h-auto w-full object-cover"></figure>{% endif %}
      <article class="post-content mt-8 text-stone-800 dark:text-stone-200">{{ page.content }}</article>
    </main>
{% endblock %}

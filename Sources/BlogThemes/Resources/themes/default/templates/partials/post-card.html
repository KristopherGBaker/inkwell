<article class="group rounded-2xl border border-stone-300/70 bg-stone-50/60 p-6 shadow-[0_10px_40px_-22px_rgba(28,25,23,0.45)] transition hover:-translate-y-0.5 hover:border-amber-700/40 hover:shadow-[0_18px_50px_-24px_rgba(146,64,14,0.35)] dark:border-stone-700 dark:bg-stone-900/55 dark:shadow-[0_16px_42px_-28px_rgba(0,0,0,0.8)]">
          <p class="text-xs uppercase tracking-[0.22em] text-stone-500 dark:text-stone-400">{{ post.date }}</p>
          <h2 class="mt-2 font-display text-2xl leading-tight text-stone-900 dark:text-stone-50"><a class="decoration-amber-700/40 underline-offset-4 group-hover:underline" href="{{ post.link }}">{{ post.title }}</a></h2>
          <p class="mt-3 text-sm leading-relaxed text-stone-700 dark:text-stone-300">{{ post.summary }}</p>
          <div class="mt-4 flex flex-wrap gap-2">{% for chip in post.chips %}<a href="{{ chip.href }}" class="rounded-full border border-stone-400/50 px-2.5 py-1 text-[11px] uppercase tracking-[0.12em] text-stone-600 transition hover:border-amber-700/50 hover:text-amber-800 dark:border-stone-600 dark:text-stone-300 dark:hover:border-amber-300 dark:hover:text-amber-200">{{ chip.label }}</a>{% endfor %}</div>
          <a class="mt-4 inline-flex items-center gap-2 text-sm font-medium text-amber-800 dark:text-amber-300" href="{{ post.link }}">Read entry <span aria-hidden="true">-></span></a>
        </article>

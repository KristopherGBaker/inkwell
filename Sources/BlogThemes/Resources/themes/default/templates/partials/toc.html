<nav class="toc" aria-label="Table of contents">
  <ol class="toc-list">
    {% for entry in page.toc %}<li class="toc-item toc-level-{{ entry.level }}"><a href="#{{ entry.anchor }}">{{ entry.text }}</a>{% if entry.children %}<ol class="toc-sublist">{% for child in entry.children %}<li class="toc-item toc-level-{{ child.level }}"><a href="#{{ child.anchor }}">{{ child.text }}</a></li>{% endfor %}</ol>{% endif %}</li>{% endfor %}
  </ol>
</nav>
